name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What is the problem or gap
      description: What are you trying to do that the app makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed idea
      description: How might it work? A rough sketch is fine.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Engine / optimizer
        - Data (encounters, types, evolutions)
        - Maps
        - UI / mobile
        - Accessibility
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional.
