name: Bug report
description: Something is broken or wrong
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill in what you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I ... the app ... but I expected ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: If a share link reproduces it, paste the URL.
      placeholder: |
        1. Select Gen II
        2. Spin
        3. ...
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Edge (Chromium)
        - Safari (WebKit)
        - Firefox
        - Other (note it below)
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Mobile
        - Tablet
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or console errors
      description: Optional. Drag an image in, or paste any console output.
