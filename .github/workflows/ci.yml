name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint · engine tests · build drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Engine tests
        run: npm test
      - name: Build has no source drift
        run: |
          npm run build
          git diff --exit-code app/lab.built.html \
            || { echo "::error::lab.built.html is stale. Run 'npm run build' and commit the result."; exit 1; }

  e2e:
    name: E2E · Chromium · WebKit · Firefox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: End-to-end tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
